<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Add Workshop</title>

  <link rel="stylesheet" href="globals.css" />
  <link rel="stylesheet" href="admin.css" />
</head>

<body class="modal-open">

<div class="modal-overlay"></div>

<div class="modal">
  <form class="container" id="workshopForm">
    <div class="modal-header">
      <h2>Buat Workshop Baru</h2>
      <a href="workshopList.html" class="close-btn">×</a>
    </div>

    <div class="modal-body">

      <div class="form-group">
        <label>Judul Workshop</label>
        <input type="text" name="judul" placeholder="Contoh: Cloud Security" required />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Tanggal</label>
          <input type="date" name="tanggal" required />
        </div>

        <div class="form-group">
          <label>Waktu</label>
          <input type="time" name="waktu" required />
        </div>
      </div>

      <div class="form-group">
        <label>Lokasi</label>
        <input type="text" name="lokasi" placeholder="Link Zoom atau Alamat" />
      </div>

      <div class="form-group">
        <label>Kapasitas</label>
        <input type="number" name="kapasitas" min="1" placeholder="50" />
      </div>

      <div class="form-group">
        <label>Deskripsi</label>
        <textarea name="deskripsi" rows="4"
          placeholder="Deskripsi lengkap workshop..."></textarea>
      </div>

    </div>

    <div class="modal-footer">
      <a href="WorkshopList.html" class="btn-cancel">Batal</a>
      <button type="submit" class="btn-save">Simpan Workshop</button>
    </div>

  </form>
</div>

</body>
</html>
