<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Edit Workshop</title>

  <link rel="stylesheet" href="globals.css" />
  <link rel="stylesheet" href="admin.css" />
</head>

<body class="modal-open">

<div class="modal-overlay"></div>
<div class="modal">
  <form class="container" id="editWorkshopForm">

    <div class="modal-header">
      <h2>Edit Workshop</h2>
      <a href="workshopList.html" class="close-btn">×</a>
    </div>
    <div class="modal-body">
      <input type="hidden" name="id" id="workshopId">

      <div class="form-group">
        <label>Judul Workshop</label>
        <input type="text" id="judul" required />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Tanggal</label>
          <input type="date" id="tanggal" required />
        </div>

        <div class="form-group">
          <label>Waktu</label>
          <input type="time" id="waktu" required />
        </div>
      </div>

      <div class="form-group">
        <label>Lokasi</label>
        <input type="text" id="lokasi" />
      </div>

      <div class="form-group">
        <label>Kapasitas</label>
        <input type="number" id="kapasitas" min="1" />
      </div>

      <div class="form-group">
        <label>Deskripsi</label>
        <textarea id="deskripsi" rows="4"></textarea>
      </div>

    </div>

    <div class="modal-footer">
      <a href="workshopList.html" class="btn-cancel">Batal</a>
      <button type="submit" class="btn-save">Simpan Edit</button>
    </div>

  </form>
</div>

<script src="app.js"></script>
</body>
</html>
