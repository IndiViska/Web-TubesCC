<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>WorkshopHub</title>
    <link rel="stylesheet" href="globals.css" />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="login">

      <header class="header">
        <img src="assest/report.png" alt="Logo" class="logo">
        <span class="brand-name">WorkshopHub</span>
      </header>

      <div class="auth-wrapper login">
        <div class="login-icon">
          <img src="assest/Container.png" alt="icon" />
        </div>

        <h2>Selamat Datang!</h2>
        <p class="subtitle">Masuk untuk mengakses akun Anda</p>

        <form class="form">
          <div class="field">
            <label>Email</label>
            <input type="email" placeholder="Contoh: kimwonpil@email.com" />
          </div>

          <div class="field">
            <label>Password</label>
            <input type="password" placeholder="Minimal 8 karakter" />
          </div>

          <div class="options">
            <label class="remember">
              <input type="checkbox">
              Ingat saya
            </label>
            <a href="regist.html" class="forgot">Lupa password?</a>
          </div>

          <button type="submit" class="btn-primary">
            Masuk
          </button>

          <p class="register-link">
            Belum punya akun? <a href="regist.html">Daftar Sekarang</a>
          </p>
        </form>
      </div>
    </div>
  </body>
</html>
