<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard Peserta</title>

  <link rel="stylesheet" href="globals.css" />
  <link rel="stylesheet" href="peserta.css" />
</head>
<body>

<div class="dashboard">

  <aside class="sidebar">
    <div class="sidebar-brand">
      <img src="assest/report.png" alt="Logo" />
      <span>WorkshopHub</span>
    </div>

    <nav class="sidebar-menu">
      <a href="DashPeserta.html">
        <img src="assest/laptop.png" alt="Dashboard Icon" />
        <span>Dashboard Peserta</span>
      </a>
      <a href="workPeserta.html">
        <img src="assest/list--boxes.png" alt="Workshop List Icon" />
        <span>Workshop List</span>
      </a>
      <a class="active" href="profil.html">
        <img src="assest/user.png" alt="Profil Icon" />
        <span>Profil</span>
      </a>
    </nav>
  </aside>

  <main class="main">

    <header class="topbar">
      <span class="page-title">Halo {{nama_peserta}}</span>

      <div class="topbar-user">
        <div class="user-badge">
          <img src="assest/user.png" alt="User">
          <span>Peserta</span>
        </div>

        <a href="index.html" class="logout-btn">
          <img src="assest/Span.png" alt="Logout">
          <span>Keluar</span>
        </a>
      </div>
    </header>

    <section class="content">

      <section class="summary">
        <div class="card">
          <div class="card-top">
            <p>Workshop Terdaftar</p>
            <div class="card-icon blue">
                <img src="assest/jml work peserta.png" alt="workshop terdaftar" />
            </div>
          </div>
          <h2 id="totalWorkshop" class="card-value">0</h2>
        </div>

        <div class="card">
          <div class="card-top">
            <p>Tanggal Workshop Terdekat</p>
            <div class="card-icon blue">
                <img src="assest/work terdekat.png" alt="workshop terdaftar" />
            </div>
          </div>
          <h2 id="tanggal_workshop" class="card-value">10 Oktober 2025</h2>
        </div>
    </section>
  
    <section class="profile-wrapper">

      <div class="profile-box">

        <div class="profile-icon">
          <img src="assest/user-besar.png" alt="User Icon">
        </div>

        <div class="profile-data">
          <h3 class="profile-title">Profil</h3>

            <div class="profile-row">
              <span class="label">Nama</span>
              <span class="colon">:</span>
              <span class="value">Kim Wonpil</span>
            </div>

            <div class="profile-row">
              <span class="label">Email Aktif</span>
              <span class="colon">:</span>
              <span class="value">kimPilwon@gmail.com</span>
            </div>

            <div class="profile-row">
              <span class="label">Status</span>
              <span class="colon">:</span>
              <span class="value status-active">Aktif</span>
            </div>

            <div class="profile-row">
              <span class="label">Username</span>
              <span class="colon">:</span>
              <span class="value">Wonpil</span>
            </div>
        </div>
      </div>
    </section>
  </main>
</div>

</body>
</html>
