<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>WorkshopHub</title>
    <link rel="stylesheet" href="globals.css" />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="registrasi">
      <header class="header">
        <img class="logo" src="assest/report.png" alt="logo" />
        <span class="brand-name">WorkshopHub</span>
      </header>

      <div class="register-wrapper">
        <div class="register-icon">
          <img src="assest/Container.png" alt="icon" />
        </div>

        <h2>Buat Akun Baru</h2>
        <p class="subtitle">Jelajahi lebih lanjut dengan bergabung dengan kami!</p>

        <form class="form-register">
          <div class="field">
            <label>Nama Lengkap</label>
            <input type="text" placeholder="Contoh: Kim Wonpil" name="name" />
          </div>

          <div class="field">
            <label>Email</label>
            <input type="email" placeholder="kimwonpil@email.com" name="email" />
          </div>

          <div class="field">
            <label>Password</label>
            <input type="password" placeholder="Minimal 8 karakter" name="password" />
          </div>

          <div class="field">
            <label>Konfirmasi Password</label>
            <input type="password" placeholder="Ulangi password" name="confirm_password" />
          </div>

          <p class="terms">
            Dengan mendaftar, Anda menyetujui
            <a href="#">Syarat & Ketentuan</a> kami.
          </p>

          <button type="submit" class="btn-primary">Daftar Akun</button>

          <p class="login-link">
            Sudah punya akun? <a href="login.html">Masuk disini</a>
          </p>
        </form>
      </div>

    </div>
  </body>
</html>
